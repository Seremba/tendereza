name: sda_hymnal
description: SDA Hymn Book — English & Luganda, offline-first.
publish_to: 'none'
version: 1.0.1+5
environment:
  sdk: '>=3.3.0 <4.0.0'
dependencies:
  flutter:
    sdk: flutter
  # State management
  flutter_riverpod: ^2.5.1
  # Persistence
  shared_preferences: ^2.2.3
  # Sharing
  share_plus: ^9.0.0
  # Fonts
  google_fonts: ^6.2.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
flutter:
  uses-material-design: true
  assets:
    - assets/data/hymns_en.json
    - assets/data/hymns_lg.json
  fonts:
    - family: Lato
      fonts:
        - asset: assets/fonts/Lato-Regular.ttf
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
    - family: Gentium Plus
      fonts:
        - asset: assets/fonts/GentiumPlus-Regular.ttf